# Claude Code Boilerplate — TypeScript 5 + Commander CLI (Framework-Less Tool)
# Run: ia-dev-env generate --config setup-config.typescript-commander-cli.yaml
#
# Commander-based CLI tool with template rendering and YAML configuration.
# Targets TypeScript 5+ with Node.js runtime. No web framework — all
# interaction via command-line interface. Uses npm packaging.

# ═══════════════════════════════════════════════════
# SECTION 1: PROJECT IDENTITY
# ═══════════════════════════════════════════════════
project:
  name: "ia-dev-environment"
  purpose: "CLI tool that generates .claude/ and .github/ boilerplate for AI-assisted development environments, with config-driven templates, skills, agents, hooks, and MCP server setup"

# ═════════════════════════════════════════════════
# PLATFORM (AI target platforms)
# Options: claude-code, copilot, codex, all
# 'all' generates artifacts for every supported platform.
# ═════════════════════════════════════════════════
platform: all

# ═════════════════════════════════════════════════
# BRANCHING MODEL (Git workflow strategy)
# Options: gitflow, trunk
# gitflow: uses develop as base branch, release branches
# trunk: uses main as base branch, direct tags
# ═════════════════════════════════════════════════
branching-model: gitflow

# ═══════════════════════════════════════════════════
# SECTION 2: ARCHITECTURE
# ═══════════════════════════════════════════════════
architecture:
  style: library                   # CLI tool — not a microservice
  domain_driven: false             # CLI tools rarely need full DDD
  event_driven: false

# ═══════════════════════════════════════════════════
# SECTION 3: INTERFACES
# ═══════════════════════════════════════════════════
interfaces:
  - type: cli                      # Commander command-line interface

# ═══════════════════════════════════════════════════
# SECTION 4: LANGUAGE
# ═══════════════════════════════════════════════════
language:
  name: typescript
  version: "5"

# ═══════════════════════════════════════════════════
# SECTION 5: FRAMEWORK
# ═══════════════════════════════════════════════════
framework:
  name: commander                  # Framework-less CLI — Commander is the only framework
  version: ""
  build_tool: npm                  # package.json + tsx/tsup
  native_build: false              # Node.js runtime — no native compilation

# ═══════════════════════════════════════════════════
# SECTION 6: DATA
# ═══════════════════════════════════════════════════
data:
  database:
    type: none                     # CLI tool — file-based I/O, no database
    version: ""
    migration: none

  cache:
    type: none
    version: ""

  message_broker:
    type: none
    version: ""

# ═══════════════════════════════════════════════════
# SECTION 7: SECURITY
# ═══════════════════════════════════════════════════
security:
  compliance: []                   # Adjust if CLI handles sensitive data
  encryption:
    at_rest: false
    key_management: none
  pentest_readiness: false

# ═══════════════════════════════════════════════════
# SECTION 8: CLOUD PROVIDER
# ═══════════════════════════════════════════════════
cloud:
  provider: none                   # CLI tool — cloud-agnostic

# ═══════════════════════════════════════════════════
# SECTION 9: INFRASTRUCTURE
# ═══════════════════════════════════════════════════
infrastructure:
  container: docker                # Optional — for reproducible builds
  orchestrator: none               # CLI tool — no orchestration needed
  templating: none
  iac: none
  registry: none
  api_gateway: none
  service_mesh: none

# ═══════════════════════════════════════════════════
# SECTION 10: OBSERVABILITY
# ═══════════════════════════════════════════════════
observability:
  standard: none                   # CLI uses structured logging to stderr
  backend: none

# ═══════════════════════════════════════════════════
# SECTION 11: TESTING
# ═══════════════════════════════════════════════════
testing:
  smoke_tests: true                # Verify CLI entrypoints work after install
  performance_tests: false
  contract_tests: false
  chaos_tests: false

# ═══════════════════════════════════════════════════
# SECTION 12: DOMAIN TEMPLATE
# ═══════════════════════════════════════════════════
domain:
  template: none

# ═══════════════════════════════════════════════════
# SECTION 13: CONVENTIONS
# ═══════════════════════════════════════════════════
conventions:
  code_language: en
  commit_language: en
  documentation_language: pt-br
  git_scopes:
    - { scope: "cli", area: "Commander commands and subcommands" }
    - { scope: "core", area: "Core business logic and assemblers" }
    - { scope: "domain", area: "Domain models and value objects" }
    - { scope: "templates", area: "Handlebars/EJS templates and rendering" }
    - { scope: "config", area: "Configuration loading and validation" }
    - { scope: "tests", area: "Test suite" }

# ═══════════════════════════════════════════════════
# SECTION 14: SKILLS / AGENTS / HOOKS / SETTINGS
# ═══════════════════════════════════════════════════
skills:
  override: auto
agents:
  override: auto
  adaptive_model:
    junior: "haiku"
    mid: "sonnet"
    senior: "opus"
hooks:
  post_compile: false              # Interpreted via tsx — no compilation step
settings:
  auto_generate: true

# ═══════════════════════════════════════════════════
# SECTION 18: MCP SERVERS
# ═══════════════════════════════════════════════════
mcp:
  servers: []
  # Example:
  # - id: "my-mcp-server"
  #   url: "https://mcp.example.com"
  #   env:
  #     API_KEY: "$MCP_API_KEY"
