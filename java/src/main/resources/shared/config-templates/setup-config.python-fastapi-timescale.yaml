# Claude Code Boilerplate — Python 3.12 + FastAPI (TimescaleDB Time-Series)
# Run: ia-dev-env generate --stack python-fastapi-timescale
#
# Inherits python-fastapi base with TimescaleDB time-series specialization.
# Adds hypertable patterns, continuous aggregates, and retention policies.

# ═══════════════════════════════════════════════════
# SECTION 1: PROJECT IDENTITY
# ═══════════════════════════════════════════════════
project:
  name: "my-fastapi-timescale"
  purpose: "Describe your time-series service here"

# ═══════════════════════════════════════════════════
# SECTION 2: ARCHITECTURE
# ═══════════════════════════════════════════════════
architecture:
  style: microservice
  domain_driven: true
  event_driven: false

# ═══════════════════════════════════════════════════
# SECTION 3: INTERFACES
# ═══════════════════════════════════════════════════
interfaces:
  - type: rest
    spec: openapi

# ═══════════════════════════════════════════════════
# SECTION 4: LANGUAGE
# ═══════════════════════════════════════════════════
language:
  name: python
  version: "3.12"

# ═══════════════════════════════════════════════════
# SECTION 5: FRAMEWORK
# ═══════════════════════════════════════════════════
framework:
  name: fastapi
  version: ""
  build_tool: pip
  native_build: false

# ═══════════════════════════════════════════════════
# SECTION 6: DATA
# ═══════════════════════════════════════════════════
data:
  database:
    type: timescaledb
    version: "2"
    migration: alembic

  cache:
    type: none
    version: ""

  message_broker:
    type: none
    version: ""

# ═══════════════════════════════════════════════════
# SECTION 7: SECURITY
# ═══════════════════════════════════════════════════
security:
  compliance: []
  encryption:
    at_rest: false
    key_management: none
  pentest_readiness: false

# ═══════════════════════════════════════════════════
# SECTION 8: CLOUD PROVIDER
# ═══════════════════════════════════════════════════
cloud:
  provider: none

# ═══════════════════════════════════════════════════
# SECTION 9: INFRASTRUCTURE
# ═══════════════════════════════════════════════════
infrastructure:
  container: docker
  orchestrator: none
  templating: none
  iac: none
  registry: none
  api_gateway: none
  service_mesh: none

# ═══════════════════════════════════════════════════
# SECTION 10: OBSERVABILITY
# ═══════════════════════════════════════════════════
observability:
  standard: opentelemetry
  backend: grafana-stack

# ═══════════════════════════════════════════════════
# SECTION 11: TESTING
# ═══════════════════════════════════════════════════
testing:
  smoke_tests: true
  performance_tests: false
  contract_tests: false
  chaos_tests: false

# ═══════════════════════════════════════════════════
# SECTION 12: DOMAIN TEMPLATE
# ═══════════════════════════════════════════════════
domain:
  template: none

# ═══════════════════════════════════════════════════
# SECTION 13: CONVENTIONS
# ═══════════════════════════════════════════════════
conventions:
  code_language: en
  commit_language: en
  documentation_language: en
  git_scopes:
    - { scope: "domain", area: "Core domain logic" }
    - { scope: "timeseries", area: "Time-series models and queries" }
    - { scope: "infra", area: "Infrastructure and adapters" }
    - { scope: "api", area: "REST API layer" }
    - { scope: "config", area: "Configuration and settings" }

# ═══════════════════════════════════════════════════
# SECTION 14: SKILLS / AGENTS / HOOKS / SETTINGS
# ═══════════════════════════════════════════════════
skills:
  override: auto
agents:
  override: auto
  adaptive_model:
    junior: "haiku"
    mid: "sonnet"
    senior: "opus"
hooks:
  post_compile: false
settings:
  auto_generate: true

# ═══════════════════════════════════════════════════
# SECTION 18: MCP SERVERS
# ═══════════════════════════════════════════════════
mcp:
  servers: []
