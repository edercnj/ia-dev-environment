name: audit

# Governance CI gates (EPIC-0058 — generated by ia-dev-env).
# Runs on every PR to develop or epic/* branches.
# Invokes all 5 audit scripts via fail-fast matrix after self-check.
# See Rule 26 (Audit Gate Lifecycle) and docs/audit-gates-catalog.md.

on:
  pull_request:
    branches:
      - develop
      - 'epic/**'

jobs:
  audit-self-check:
    name: Self-check audit scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Self-check audit-flow-version.sh
        run: bash .claude/scripts/audit-flow-version.sh --self-check
      - name: Self-check audit-epic-branches.sh
        run: bash .claude/scripts/audit-epic-branches.sh --self-check
      - name: Self-check audit-skill-visibility.sh
        run: bash .claude/scripts/audit-skill-visibility.sh --self-check
      - name: Self-check audit-model-selection.sh
        run: bash .claude/scripts/audit-model-selection.sh --self-check
      - name: Self-check audit-execution-integrity.sh
        run: bash .claude/scripts/audit-execution-integrity.sh --self-check

  audit-matrix:
    name: Run ${{ matrix.script }}
    needs: [audit-self-check]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        script:
          - audit-flow-version.sh
          - audit-epic-branches.sh
          - audit-skill-visibility.sh
          - audit-model-selection.sh
          - audit-execution-integrity.sh
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run audit script
        run: bash .claude/scripts/${{ matrix.script }}
