name: CI — ia-dev-environment

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CI: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4



      - name: Set up Node.js 5
        uses: actions/setup-node@v4
        with:
          node-version: "5"
          cache: npm

      - name: Install dependencies
        run: npm ci





      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Coverage
        run: npm test -- --coverage


  image-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ia-dev-environment:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ia-dev-environment:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

