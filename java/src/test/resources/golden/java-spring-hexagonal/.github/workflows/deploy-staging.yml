name: Deploy Staging — my-spring-hexagonal

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/my-spring-hexagonal
  ENVIRONMENT: staging

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build
        run: ./gradlew build -x test

      - name: Test
        run: ./gradlew test






  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:staging-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:staging-latest

      - name: Deploy to staging
        run: |
          echo "Deploying ${{ env.IMAGE_NAME }}:staging-${{ github.sha }} to staging"
          # Replace with actual deployment command

  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging"
          # Replace with actual smoke test command
