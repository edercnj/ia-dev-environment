# audit-execution-integrity.conf — Camada 3 (Rule 24) artifact pattern catalogue.
#
# This file documents the canonical evidence-artifact patterns checked by
# scripts/audit-execution-integrity.sh per the expanded Mandatory Evidence
# Artifacts table (Rule 24 §32-42, EPIC-0057 story-0057-0001).
#
# Format: one entry per line, KEY=VALUE syntax. Comments start with '#'.
#
# {EPIC} and {STORY} are placeholder tokens substituted by the script at
# runtime — {EPIC} resolves to the 4-digit epic id derived from the story
# id; {STORY} resolves to the canonical story id (e.g., story-0057-0001).
#
# Hard artifacts (HARD_*): absence on a non-grandfathered story merge fails
# the audit with EIE_EVIDENCE_MISSING.
#
# Soft artifacts (SOFT_*): absence is logged but does not fail the audit.
# These cover skills whose evidence lives in telemetry NDJSON (x-pr-create,
# x-git-commit) or whose artifact is conditionally produced (x-arch-plan,
# x-test-tdd, x-threat-model).

HARD_VERIFY_ENVELOPE=plans/epic-{EPIC}/reports/verify-envelope-{STORY}.json
HARD_REVIEW=plans/epic-{EPIC}/plans/review-story-{STORY}.md
HARD_TECHLEAD_REVIEW=plans/epic-{EPIC}/plans/techlead-review-story-{STORY}.md
HARD_STORY_REPORT=plans/epic-{EPIC}/reports/story-completion-report-{STORY}.md

SOFT_ARCH_PLAN=plans/epic-{EPIC}/plans/arch-story-{STORY}.md
SOFT_TEST_RUN=plans/epic-{EPIC}/reports/test-run-{STORY}.txt
SOFT_DEPENDENCY_AUDIT=plans/epic-{EPIC}/reports/dependency-audit-{STORY}.md
SOFT_THREAT_MODEL=plans/epic-{EPIC}/plans/threat-model-story-{STORY}.md

# Camada 2 / 4 artifacts: not audited at file-level by Camada 3 — they are
# verified by the runtime Stop hook (.claude/hooks/verify-story-completion.sh)
# and by the telemetry NDJSON observability layer respectively.
#
# CAM2_PR_WATCH_STATE=.claude/state/pr-watch-{PR}.json   # checked by Stop hook
# CAM4_PR_CREATE_TELEMETRY=plans/epic-{EPIC}/telemetry/events.ndjson
# CAM4_GIT_COMMIT_LOG=git log --oneline (branch HEAD)
