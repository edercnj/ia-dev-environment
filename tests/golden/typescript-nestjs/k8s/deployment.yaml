apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-nestjs-service
  labels:
    app: my-nestjs-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-nestjs-service
  template:
    metadata:
      labels:
        app: my-nestjs-service
    spec:
      containers:
        - name: my-nestjs-service
          image: my-nestjs-service:latest
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          envFrom:
            - configMapRef:
                name: my-nestjs-service-config
