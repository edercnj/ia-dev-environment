# Python + FastAPI, REST, MCP servers, no hooks
project:
  name: "codex-python-fastapi-test"
  purpose: "Python FastAPI integration test fixture"
architecture:
  style: microservice
  domain_driven: false
  event_driven: false
interfaces:
  - type: rest
    spec: openapi
language:
  name: python
  version: "3.12"
framework:
  name: fastapi
  version: "0.100"
  build_tool: pip
  native_build: false
data:
  database:
    type: none
    version: ""
    migration: none
  cache:
    type: none
    version: ""
hooks:
  post_compile: false
settings:
  auto_generate: true
mcp:
  servers:
    - id: "firecrawl"
      url: "https://firecrawl.example.com"
      env:
        FC_KEY: "$FIRECRAWL_KEY"
