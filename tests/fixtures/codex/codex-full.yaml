# Full-featured config: TypeScript + NestJS, DDD, security, MCP, hooks
project:
  name: "codex-full-test"
  purpose: "Full-featured integration test fixture"
architecture:
  style: microservice
  domain_driven: true
  event_driven: true
interfaces:
  - type: rest
    spec: openapi
  - type: graphql
    spec: code-first
  - type: event-consumer
    broker: kafka
  - type: event-producer
    broker: kafka
language:
  name: typescript
  version: "5"
framework:
  name: nestjs
  version: ""
  build_tool: npm
  native_build: false
data:
  database:
    type: postgresql
    version: "17"
    migration: prisma
  cache:
    type: redis
    version: "7.4"
  message_broker:
    type: kafka
    version: "3.7"
security:
  frameworks:
    - lgpd
  encryption:
    at_rest: true
    key_management: vault
  pentest_readiness: true
infrastructure:
  container: docker
  orchestrator: kubernetes
  templating: kustomize
  iac: terraform
  registry: none
  api_gateway: kong
  service_mesh: none
observability:
  standard: opentelemetry
  backend: grafana-stack
testing:
  smoke_tests: true
  contract_tests: true
hooks:
  post_compile: false
settings:
  auto_generate: true
mcp:
  servers:
    - id: "test-server"
      url: "https://mcp.example.com"
      env:
        API_KEY: "$MCP_API_KEY"
