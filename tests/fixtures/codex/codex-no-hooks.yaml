# Config without hooks — validates approval_policy = "untrusted"
# Uses Python + pip which does NOT auto-generate hook scripts
project:
  name: "codex-no-hooks-test"
  purpose: "No-hooks integration test fixture"
architecture:
  style: library
  domain_driven: false
  event_driven: false
interfaces:
  - type: cli
language:
  name: python
  version: "3.12"
framework:
  name: click
  version: "8.1"
  build_tool: pip
  native_build: false
hooks:
  post_compile: false
settings:
  auto_generate: true
