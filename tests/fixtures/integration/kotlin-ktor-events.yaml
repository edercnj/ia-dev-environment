project:
  name: "my-ktor-service"
  purpose: "Kotlin Ktor event-driven service"
architecture:
  style: microservice
  domain_driven: true
  event_driven: true
interfaces:
  - type: rest
    spec: openapi
  - type: websocket
  - type: event-consumer
    broker: kafka
  - type: event-producer
    broker: kafka
language:
  name: kotlin
  version: "2.1"
framework:
  name: ktor
  version: ""
  build_tool: gradle
  native_build: false
data:
  database:
    name: postgresql
    version: "17"
  migration:
    name: flyway
  cache:
    name: redis
    version: "7.4"
infrastructure:
  container: docker
  orchestrator: kubernetes
  iac: terraform
  api_gateway: kong
security:
  frameworks: []
testing:
  smoke_tests: true
  contract_tests: true
  performance_tests: true
