project:
  name: "my-nestjs-app"
  purpose: "TypeScript NestJS fullstack monolith"
architecture:
  style: monolith
  domain_driven: true
  event_driven: false
interfaces:
  - type: rest
    spec: openapi
language:
  name: typescript
  version: "5.7"
framework:
  name: nestjs
  version: "10.4"
  build_tool: npm
  native_build: false
data:
  database:
    name: postgresql
    version: "17"
  migration:
    name: typeorm
  cache:
    name: redis
    version: "7.4"
infrastructure:
  container: docker
  orchestrator: kubernetes
security:
  frameworks:
    - passport
testing:
  smoke_tests: true
  contract_tests: false
  performance_tests: true
