project:
  name: "mcp-service"
  purpose: "Config with MCP servers"
architecture:
  style: microservice
  domain_driven: false
  event_driven: false
interfaces:
  - type: rest
    spec: openapi
language:
  name: java
  version: "21"
framework:
  name: spring-boot
  version: "3.4"
  build_tool: gradle
  native_build: false
mcp:
  servers:
    - id: "test-mcp"
      url: "https://mcp.example.com"
      capabilities:
        - search
        - fetch
      env:
        API_KEY: "$TEST_API_KEY"
    - id: "secondary-mcp"
      url: "https://mcp2.example.com"
      capabilities:
        - code-review
