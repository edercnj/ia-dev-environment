project:
  name: "my-spring-service"
  purpose: "Java Spring microservice with REST"
architecture:
  style: microservice
  domain_driven: true
  event_driven: true
interfaces:
  - type: rest
    spec: openapi
  - type: grpc
    spec: proto3
  - type: event-consumer
    broker: kafka
  - type: event-producer
    broker: kafka
language:
  name: java
  version: "21"
framework:
  name: spring-boot
  version: "3.x"
  build_tool: gradle
  native_build: true
data:
  database:
    name: postgresql
    version: "17"
  migration:
    name: flyway
  cache:
    name: redis
    version: "7.4"
infrastructure:
  container: docker
  orchestrator: kubernetes
  templating: kustomize
  iac: terraform
  api_gateway: kong
security:
  frameworks:
    - spring-security
testing:
  smoke_tests: true
  contract_tests: true
  performance_tests: true
