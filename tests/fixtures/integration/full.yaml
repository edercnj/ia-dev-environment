project:
  name: "full-service"
  purpose: "Full config with all sections"
architecture:
  style: microservice
  domain_driven: true
  event_driven: true
interfaces:
  - type: rest
    spec: openapi
  - type: grpc
    spec: proto3
  - type: event-consumer
    broker: kafka
  - type: event-producer
    broker: kafka
language:
  name: java
  version: "21"
framework:
  name: spring-boot
  version: "3.4"
  build_tool: gradle
  native_build: true
data:
  database:
    name: postgresql
    version: "17"
  migration:
    name: flyway
    version: ""
  cache:
    name: redis
    version: "7.4"
infrastructure:
  container: docker
  orchestrator: kubernetes
  templating: kustomize
  iac: terraform
  registry: ghcr
  api_gateway: kong
  service_mesh: istio
  observability:
    tool: opentelemetry
    metrics: prometheus
    tracing: jaeger
security:
  frameworks:
    - spring-security
    - oauth2
testing:
  smoke_tests: true
  contract_tests: true
  performance_tests: true
  coverage_line: 95
  coverage_branch: 90
mcp:
  servers:
    - id: "test-mcp"
      url: "https://mcp.example.com"
      capabilities:
        - search
        - fetch
      env:
        API_KEY: "$TEST_API_KEY"
