name: Skill Name Guard (EPIC-0036)

# Fails the build whenever any of the 19 OLD skill names from
# EPIC-0036 (Skill Taxonomy and Naming Refactor) reappears in a
# tracked file outside the documented allow-list.
#
# Runs on every push and PR that targets `develop` or `main`.

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  check-old-skill-names:
    name: Check for old EPIC-0036 skill names
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run skill-name guard
        run: bash scripts/check-old-skill-names.sh

      - name: Run guard self-tests
        run: bash tests/guard/test-skill-name-guard.sh
